<html lang="zh-CN">

<style>
/* ── Global ── */
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#F8F9FA;color:#111827;margin:0;padding:0;overflow-x:hidden}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0%}to{width:var(--w)}}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}

.anim-fadeIn{animation:fadeIn .3s ease-out}
.anim-fadeInUp{animation:fadeInUp .4s ease-out}
.anim-fadeInLeft{animation:fadeInLeft .4s ease-out}
.anim-scaleIn{animation:scaleIn .3s ease-out}
.anim-blink{animation:blink 1.5s ease-in-out infinite}
.anim-pulse{animation:pulse 3s ease-in-out infinite}
.anim-slideUp{animation:slideUp .5s ease-out}
.anim-slideDown{animation:slideDown .3s ease-out}
.anim-toastIn{animation:toastIn .3s ease-out}
.anim-toastOut{animation:toastOut .3s ease-out forwards}

/* ── Transitions ── */
.hover-lift{transition:transform .2s ease,box-shadow .2s ease}
.hover-lift:hover{transform:translateY(-2px);box-shadow:0 10px 25px -5px rgba(0,0,0,.08)}

/* ── Loading Screen ── */
.loading-screen{position:fixed;inset:0;z-index:999;background:#F8F9FA;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.loading-pulse{position:absolute;border-radius:50%;filter:blur(64px);animation:pulse 3s ease-in-out infinite}
.loading-pulse:nth-child(2){filter:blur(48px);animation-delay:.5s}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9CA3AF}

/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px}
.toast-item{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.08);max-width:320px;display:flex;align-items:flex-start;gap:10px;animation:toastIn .3s ease-out}
.toast-item.success .toast-icon{color:#10B981}
.toast-item.error .toast-icon{color:#EF4444}
.toast-item.info .toast-icon{color:#3B82F6}
.toast-icon{flex-shrink:0;margin-top:1px}
.toast-body{flex:1;min-width:0}
.toast-title{font-size:13px;font-weight:600;color:#111827}
.toast-desc{font-size:12px;color:#6B7280;margin-top:2px}

/* ── Modal backdrop ── */
.modal-backdrop{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease-out}
.modal-content{background:#fff;border-radius:16px;box-shadow:0 25px 50px -12px rgba(0,0,0,.15);width:90%;max-width:520px;max-height:90vh;overflow-y:auto;animation:scaleIn .3s ease-out}

/* ── Custom checkbox for filters ── */
.filter-check{display:none}
.filter-check+div{width:16px;height:16px;border:2px solid #D1D5DB;border-radius:4px;transition:all .15s}
.filter-check:checked+div{background:#38BDF8;border-color:#38BDF8}
.filter-check:checked+div::after{content:'';display:block;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin:2px auto 0}

/* ── Toggle switch ── */
.toggle-check{display:none}
.toggle-bg{width:36px;height:20px;background:#D1D5DB;border-radius:10px;transition:background .2s;position:relative}
.toggle-dot{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.toggle-check:checked+.toggle-bg{background:#38BDF8}
.toggle-check:checked+.toggle-bg .toggle-dot{transform:translateX(16px)}

/* ── Progress bar ── */
.progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#38BDF8,#0284C7);transition:width .1s linear}

/* ── Line clamp ── */
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.line-clamp-6{display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}

/* ── Stats chart animate ── */
.chart-bar{height:28px;background:linear-gradient(90deg,#7DD3FC,#38BDF8);border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .6s ease-out}

@media(max-width:768px){
  .hide-mobile{display:none!important}
}
</style>

const ToastContext=createContext(null);
let toastId=0;

function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  const addToast=useCallback((type,title,desc="")=>{
    const id=++toastId;
    setToasts(prev=>[...prev.slice(-4),{id,type,title,desc}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3000);
  },[]);
  const toast={
    success:(title,opts)=>addToast("success",title,opts?.description||""),
    error:(title,opts)=>addToast("error",title,opts?.description||""),
    info:(title,opts)=>addToast("info",title,opts?.description||""),
  };
  return React.createElement(ToastContext.Provider,{value:toast},
    children,
    React.createElement("div",{className:"toast-container"},
      toasts.map(t=>React.createElement("div",{key:t.id,className:`toast-item ${t.type}`},
        React.createElement("div",{className:"toast-icon"},t.type==="success"?Icons.CheckCircle2():t.type==="error"?Icons.AlertCircle():Icons.Info()),
        React.createElement("div",{className:"toast-body"},
          React.createElement("div",{className:"toast-title"},t.title),
          t.desc&&React.createElement("div",{className:"toast-desc"},t.desc)
        )
      ))
    )
  );
}

function useToast(){return useContext(ToastContext)}

const RouterContext=createContext(null);

function RouterProvider({children}){
  const[current,setCurrent]=useState(()=>window.location.hash.slice(1)||"/");
  useEffect(()=>{
    const onHash=()=>setCurrent(window.location.hash.slice(1)||"/");
    window.addEventListener("hashchange",onHash);
    return ()=>window.removeEventListener("hashchange",onHash);
  },[]);
  const navigate=useCallback(hash=>{window.location.hash=hash},[]);
  return React.createElement(RouterContext.Provider,{value:{path:current,navigate}},children);
}
function useRouter(){return useContext(RouterContext)}

function Route({path,element}){
  const{path:current}=useRouter();
  const match=path==="*"?true:current===path||(current==="/"&&path==="/");
  return match?React.createElement(Fragment,null,element):null;
}

function Link({to,children,className,...props}){
  const{navigate}=useRouter();
  return React.createElement("a",{href:"#"+to,onClick:e=>{e.preventDefault();navigate(to)},className,...props},children);
}

}
function useAuth(){return useContext(AuthContext)}

function parsePlays(plays){
  const s=String(plays).replace(/[,，\s]/g,"");
  if(s.includes("亿"))return parseFloat(s)*1e8;
  if(s.includes("万"))return parseFloat(s)*1e4;
  return parseInt(s)||0;
}
function formatPlays(n){
  if(n>=1e8)return (n/1e8).toFixed(1).replace(".0","")+"亿";
  if(n>=1e4)return (n/1e4).toFixed(0)+"万";
  return String(n);
}

function MusicPage(){
  const{isAdmin}=useAuth();
  const toast=useToast();
  const[data,setData]=useState([]);
  const[q,setQ]=useState("");
  const[sort,setSort]=useState("date-desc");
  const[view,setView]=useState("table");
  const[sTypes,setSTypes]=useState(new Set());
  const[sYears,setSYears]=useState(new Set());
  const[sRoles,setSRoles]=useState(new Set());
  const[onlySC,setOnlySC]=useState(false);
  const[formOpen,setFormOpen]=useState(false);
  const[editing,setEditing]=useState(null);
  const[delTarget,setDelTarget]=useState(null);

  useEffect(function(){setData(loadMusicData())},[]);
  useEffect(function(){if(data.length>0)saveMusicData(data)},[data]);

  const years=useMemo(function(){const s=new Set();data.forEach(function(i){const y=new Date(i.releaseDate).getFullYear();if(!isNaN(y))s.add(y)});return Array.from(s).sort(function(a,b){return b-a})},[data]);

  const filtered=useMemo(function(){
    var r=data.slice();
    if(q.trim()){var lq=q.toLowerCase();r=r.filter(function(i){return i.title.toLowerCase().indexOf(lq)>=0||i.album.toLowerCase().indexOf(lq)>=0})}
    if(sTypes.size>0)r=r.filter(function(i){return sTypes.has(i.type)});
    if(sYears.size>0)r=r.filter(function(i){return sYears.has(new Date(i.releaseDate).getFullYear())});
    if(sRoles.size>0)r=r.filter(function(i){return i.roles.some(function(rl){return sRoles.has(rl)})});
    if(onlySC)r=r.filter(function(i){return i.isSelfComposed});
    if(sort==="date-desc")r.sort(function(a,b){return new Date(b.releaseDate)-new Date(a.releaseDate)});
    else if(sort==="date-asc")r.sort(function(a,b){return new Date(a.releaseDate)-new Date(b.releaseDate)});
    else if(sort==="title-asc")r.sort(function(a,b){return a.title.localeCompare(b.title)});
